[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
# 300s: cold-deploy startup (first Postgres connect + init_db + idempotent
# run_seed) is borderline against the old 30s window, so deploys flakily failed
# "service unavailable" and the last-good instance was retained. Heavy catalog
# bulk-imports now run in a background thread (see app.main lifespan), so the
# pre-serve work is small; this wider window removes the remaining flakiness.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
